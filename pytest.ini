[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=.
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-report=xml
    --timeout=30
    --timeout-method=thread
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    selenium: marks tests that require selenium/webdriver
    file_operations: marks tests that perform file operations
    csv_processing: marks tests for CSV processing functionality
    excel_processing: marks tests for Excel processing functionality
    download_methods: marks tests for download methods
    browser: marks tests that interact with browser
    mock: marks tests that use mocking
    performance: marks performance tests
    regression: marks regression tests 